name: ci

# Flutter analyze + test on every push/PR. Supabase migration/function deploy
# is added in the git-setup / deployment milestone.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: stable
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test