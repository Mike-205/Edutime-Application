name: supabase-keepalive

# Prevents the Supabase free-tier 7-day inactivity pause (pressure-test
# decision). Runs every 3 days, executes one lightweight authenticated query,
# and echoes the latest daily_snapshots row so the owner sees metrics passively.

on:
  schedule:
    - cron: "0 6 */3 * *" # every 3 days at 06:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep-alive query + latest snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          echo "Pinging Supabase to prevent inactivity pause..."
          curl -sf \
            "$SUPABASE_URL/rest/v1/daily_snapshots?select=*&order=snapshot_date.desc&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"